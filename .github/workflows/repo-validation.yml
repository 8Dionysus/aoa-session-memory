name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  source_index:
    name: Repo Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Check repo-local KAG index family
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@790457eb4806586c255c2b4a9ec4a8f08789a330
