name: Standalone Validation

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  standalone:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install standalone test dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          'mcp>=1.28,<2'
          'build>=1.3,<2'
          'jsonschema>=4.25,<5'
          'pytest>=8,<10'
          'PyYAML>=6.0,<7.0'

      - name: Check decision index parity
        run: python scripts/generate_decision_indexes.py --check

      - name: Audit current public tree
        run: python scripts/audit_public_tree.py --root . --fail-on blocking

      - name: Inventory retained history on public repository
        if: github.event.repository.visibility == 'public'
        run: python scripts/audit_git_history.py --repo . --fail-on none

      - name: Run portable source tests
        run: >-
          PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -p no:cacheprovider
          tests/test_session_memory.py
          tests/test_public_tree_audit.py
          tests/test_git_history_audit.py

      - name: Run MCP package release check
        working-directory: packages/aoa-session-memory-mcp
        run: python scripts/release_check.py

      - name: Build package twice outside the checkout
        run: |
          python scripts/build_mcp_package.py \
            --outdir "$RUNNER_TEMP/build-a" \
            --staging-root "$RUNNER_TEMP/stage-a" \
            > "$RUNNER_TEMP/build-a.json"
          python scripts/build_mcp_package.py \
            --outdir "$RUNNER_TEMP/build-b" \
            --staging-root "$RUNNER_TEMP/stage-b" \
            > "$RUNNER_TEMP/build-b.json"
          python - "$RUNNER_TEMP/build-a.json" "$RUNNER_TEMP/build-b.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          first = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          second = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))
          if first["artifacts"] != second["artifacts"]:
              raise SystemExit("sdist or wheel is not byte-reproducible")
          if not first["source_unchanged"] or not second["source_unchanged"]:
              raise SystemExit("external build changed package source")
          PY

      - name: Install wheel and run synthetic protocol smoke
        run: |
          python -m venv "$RUNNER_TEMP/artifact-venv"
          wheel="$(find "$RUNNER_TEMP/build-a" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel"
          "$RUNNER_TEMP/artifact-venv/bin/pip" install "$wheel"
          "$RUNNER_TEMP/artifact-venv/bin/python" examples/synthetic/bootstrap_demo.py \
            --destination "$RUNNER_TEMP/synthetic-demo" \
            > "$RUNNER_TEMP/synthetic-demo.json"
          "$RUNNER_TEMP/artifact-venv/bin/python" examples/synthetic/mcp_protocol_smoke.py \
            --workspace-root "$RUNNER_TEMP/synthetic-demo" \
            --cwd "$RUNNER_TEMP" \
            > "$RUNNER_TEMP/mcp-protocol-smoke.json"

      - name: Re-audit clean checkout
        run: python scripts/audit_public_tree.py --root . --fail-on blocking
