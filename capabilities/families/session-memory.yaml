  - id: skill.aoa-session-memory-evidence-route
    title: Prior-session evidence route
    description: Use when an agent needs evidence from prior `.aoa` sessions about how a skill, MCP, hook, tool, API, goal, eval, test, validator, script, decision, error, receipt, or other recurring operational entity was used, what happened nearby, and which raw or segment refs prove it.
    purpose: Return bounded, fresh, source-linked session evidence while keeping mention, selection, behavior, verification, and consequence distinct.
    kind: skill
    contract_level: executable
    primary_parent: session-memory.use.query
    owner:
      repo: aoa-session-memory
      surface: skills/aoa-session-memory-evidence-route/SKILL.md
      authority: authored
    lifecycle: &advertised_lifecycle
      state: experimental
      version: 1.0.0
      visibility: advertised
      evidence_state: manual-baseline
      health: challenger
    applicability:
      use_when: [The answer depends on what happened in prior .aoa sessions and must carry resolvable raw or segment refs.]
      do_not_use_when: [Current repository or runtime state is the stronger source and no historical behavior question remains.]
      ambiguous_when: [The user asks what a component does but does not ask how it behaved previously.]
    abi:
      inputs:
        - {name: question, type: prior-session-evidence-question, required: true, description: Entity-anchored historical question.}
        - {name: search_evidence, type: search-evidence-packet, required: false, description: Optional typed search packet from the search capability.}
      outputs:
        - {name: packet, type: evidence-packet, required: true, description: Bounded evidence packet with freshness and source refs.}
    binding: {kind: skill, ref: skills/aoa-session-memory-evidence-route/SKILL.md, operation: route-evidence, availability: available}
    execution:
      freedom: bounded-judgment
      tool_requirements: [read-only session-memory MCP or portable CLI, archived evidence refs]
      verification: [Every important claim has a raw, segment, session, receipt, or owner ref., Freshness and truncation are explicit., Skill evidence does not overstate invocation or effect.]
      termination: [Stop when the bounded packet answers the question or exposes the exact next evidence expansion.]
      effects: [read-only]
      reversibility: not-applicable
      failure_modes: [Treating route counts as truth., Inferring invocation from selection or a skill read., Broad raw scanning before typed routes., Hiding stale or truncated providers.]
    trust: *read_trust
    provenance:
      source_refs:
        - {repo: aoa-session-memory, path: skills/aoa-session-memory-evidence-route/SKILL.md, ref: capability-home-v1, role: owner-skill-procedure, authority: authored}
      optional_refs: []
    classification: {category: independent-callable, disposition: retain, rationale: "It has a distinct historical-evidence trigger, evidence-packet ABI, and proof-ceiling failure modes."}
    procedure:
      <<: *standard_skill_procedure
      ref: skills/aoa-session-memory-evidence-route/SKILL.md
    security: *read_security
    keywords: [prior-session, evidence, raw-ref, segment-ref, usage-chain, mcp, skill-attribution, доказательство, история, использование, использовался, сырой-ref, сырым, ссылкам, раньше, произошло, последствие]

  - id: skill.aoa-session-search
    title: Portable session search
    description: Use when an agent needs to build or query the portable `.aoa` SQLite search index for archived Codex sessions, with evidence refs and freshness checks.
    purpose: Query or explicitly refresh the portable search projection without confusing index state with evidence truth.
    kind: skill
    contract_level: executable
    primary_parent: session-memory.use.query
    owner:
      repo: aoa-session-memory
      surface: skills/aoa-session-search/SKILL.md
      authority: authored
    lifecycle: &deferred_lifecycle
      state: experimental
      version: 1.0.0
      visibility: deferred
      evidence_state: hypothesis
      health: challenger
    applicability:
      use_when: [A bounded archive query or explicit portable search-index refresh is required.]
      do_not_use_when: [A current file, owner API, or typed entity route answers the question without archive search.]
      ambiguous_when: [The request says search without identifying current source versus prior-session evidence.]
    abi:
      inputs:
        - {name: query, type: session-query, required: true, description: Query and bounded filters.}
        - {name: indexed_sessions, type: indexed-session-set, required: false, description: Optional refreshed session projection.}
      outputs:
        - {name: results, type: search-evidence-packet, required: true, description: Ranked results with freshness and evidence refs.}
    binding: {kind: skill, ref: skills/aoa-session-search/SKILL.md, operation: query-or-refresh, availability: available}
    execution:
      freedom: bounded-judgment
      tool_requirements: [python3, session-memory CLI, SQLite]
      verification: [Provider freshness is explicit., Results preserve source refs and filters., Any refresh reports changed projection state.]
      termination: [Stop at a bounded result set, honest miss, or explicit stale-provider recovery route.]
      effects: [read-only, runtime-mutation]
      reversibility: reversible
      failure_modes: [Using search snippets as source authority., Refreshing or shrinking indexes without explicit intent., Falling through to broad text after a typed route succeeds.]
    trust: &mutation_trust
      public_safe: true
      requires_human_approval: true
      posture: authored-procedure
    provenance:
      source_refs:
        - {repo: aoa-session-memory, path: skills/aoa-session-search/SKILL.md, ref: capability-home-v1, role: owner-skill-procedure, authority: authored}
      optional_refs: []
    classification: {category: independent-callable, disposition: retain, rationale: Query and index-recovery share one stable search trigger; maintenance details remain internal modes and references.}
    procedure:
      <<: *standard_skill_procedure
      ref: skills/aoa-session-search/SKILL.md
    mutation:
      preview_required: true
      explicit_apply_required: true
      rollback_or_recovery: [Rebuild the derived SQLite projection from preserved session indexes., Keep raw archives unchanged.]
      postconditions: [Provider status names the resulting freshness state., Search results remain source-linked.]
    security: &mutation_security
      permissions: [read-session-archives, write-derived-session-index]
      network: forbidden
      external_dependencies: []
      untrusted_input: treat-as-data
    keywords: [search, sqlite, fts, provider, freshness, index, поиск]

