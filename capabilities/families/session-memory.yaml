  - id: skill.aoa-session-raw-diagnostic
    title: Raw-source diagnostic
    description: Use when a `.aoa` hook or manual archive pass cannot read the raw Codex transcript and must write an incident plus diagnostic record instead of fake memory.
    purpose: Fail closed on unreadable raw evidence and preserve one diagnostic recovery route.
    kind: skill
    contract_level: executable
    primary_parent: session-memory.stewardship.capture
    owner: {repo: aoa-session-memory, surface: skills/aoa-session-raw-diagnostic/SKILL.md, authority: authored}
    lifecycle: *deferred_lifecycle
    applicability:
      use_when: [A transcript read failed during hook or manual archive processing.]
      do_not_use_when: [The raw source is readable or no concrete archive failure exists.]
      ambiguous_when: [A derived projection is missing but raw readability has not been tested.]
    abi:
      inputs:
        - {name: failure, type: raw-read-failure, required: true, description: "Concrete source path, error, event, and session identity."}
      outputs:
        - {name: diagnostic, type: diagnostic-record, required: true, description: Incident and diagnostic refs with no fabricated archive content.}
    binding: {kind: skill, ref: skills/aoa-session-raw-diagnostic/SKILL.md, operation: record-diagnostic, availability: available}
    execution:
      freedom: deterministic
      tool_requirements: [session-memory CLI, write access to diagnostics]
      verification: [Incident and diagnostic records name the source failure., No synthetic raw or segment content was created.]
      termination: [Stop after a verified diagnostic record and explicit recovery route.]
      effects: [runtime-mutation]
      reversibility: reversible
      failure_modes: [Inventing a placeholder archive., Hiding the source error., Retrying without resolving permissions or source identity.]
    trust: *mutation_trust
    provenance:
      source_refs:
        - {repo: aoa-session-memory, path: skills/aoa-session-raw-diagnostic/SKILL.md, ref: capability-home-v1, role: owner-skill-procedure, authority: authored}
      optional_refs: []
    classification: {category: independent-callable, disposition: retain-deferred, rationale: It is the explicit fail-closed recovery capability for raw-read failure.}
    procedure: {<<: *standard_skill_procedure, ref: skills/aoa-session-raw-diagnostic/SKILL.md}
    mutation:
      preview_required: false
      explicit_apply_required: true
      rollback_or_recovery: [Correct source access or identity, then rerun the original archive route., Keep the diagnostic as evidence.]
      postconditions: [Diagnostic is resolvable., No fake session archive exists.]
    security: *mutation_security
    keywords: [raw-failure, diagnostic, incident, fail-closed, unreadable-transcript]

