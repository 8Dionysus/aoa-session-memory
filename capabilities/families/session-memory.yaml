      failure_modes: [Loading full raw evidence prematurely., Mixing multiple sessions., Presenting stale generated context as current runtime truth.]
    trust: *read_trust
    provenance:
      source_refs:
        - {repo: aoa-session-memory, path: skills/aoa-session-rehydrate/SKILL.md, ref: capability-home-v1, role: owner-skill-procedure, authority: authored}
