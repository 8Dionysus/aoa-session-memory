      state: experimental
      version: 1.0.0
      visibility: advertised
      evidence_state: manual-baseline
      health: challenger
    applicability:
      use_when: [The request names session memory, .aoa, transcripts, compaction, rehydration, hooks, or session-memory validation.]
      do_not_use_when: [A narrower non-session-memory owner is already known and no session evidence or session-memory operation is required.]
      ambiguous_when: [The request mentions memory generically without a session, transcript, or .aoa anchor.]
    abi:
      inputs:
        - {name: request, type: session-memory-request, required: true, description: One user request requiring owner routing.}
      outputs:
        - {name: selection, type: capability-selection, required: true, description: One bounded capability selection or explicit handoff.}
    binding: {kind: skill, ref: skills/aoa-session-memory-global-route/SKILL.md, operation: route, availability: available}
    execution:
      freedom: bounded-judgment
      tool_requirements: [filesystem read access, session-memory capability router]
      verification: [The selected package trigger and negative applicability match the request., The selected owner and effects are stated before execution.]
      termination: [Stop after one bounded selection, handoff, or honest no-fit result.]
      effects: [read-only]
      reversibility: not-applicable
      failure_modes: [Selecting from topical similarity alone., Treating generated routing output as procedure authority., Widening to raw evidence before a typed route is exhausted.]
    trust: &read_trust
      public_safe: true
      requires_human_approval: false
      posture: authored-procedure
    provenance:
      source_refs:
        - {repo: aoa-session-memory, path: skills/aoa-session-memory-global-route/SKILL.md, ref: capability-home-v1, role: owner-skill-procedure, authority: authored}
      optional_refs: []
    classification: {category: independent-callable, disposition: retain, rationale: It is the compact globally visible entrypoint and has a distinct routing output ABI.}
    procedure: &standard_skill_procedure
      ref: skills/aoa-session-memory-global-route/SKILL.md
      required_sections: [Trigger Boundary, Procedure, Verification, Stop Line]
      runtime_adaptation: Resolve logical roots through the active installation before invoking any adapter-specific command.
    security: &read_security
      permissions: [read-owner-source]
      network: forbidden
      external_dependencies: []
      untrusted_input: treat-as-data
